; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32s3

[env]
lib_compat_mode = strict
framework = arduino
lib_deps = 
	esp32async/ESPAsyncWebServer @ ^3.7.10
	bblanchon/ArduinoJson @ ^7.4.2
	tzapu/WiFiManager @ ^2.0.17
	mickey9801/ButtonFever @ ^1.0
	ayushsharma82/ElegantOTA @ ^3.1.7
lib_ldf_mode = deep+
monitor_speed = 115200
build_flags = 
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
	-fexceptions

[env:esp32-base]
lib_deps = 
	${env.lib_deps}
	esp32async/AsyncTCP @ ^3.4.9
	knolleary/PubSubClient@^2.8
lib_ignore = RPAsyncTCP
build_flags = 
	${env.build_flags}
	-I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board_build.partitions = partitions-4MB.csv
monitor_filters = esp32_exception_decoder

[env:esp32c3]
extends = env:esp32-base
board = esp32-c3-devkitm-1


[env:esp32s3]
extends = env:esp32-base
board = seeed_xiao_esp32s3
extra_scripts = upload.py
;upload_protocol = custom
custom_upload_url = http://magiclamp.local
custom_username = admin
custom_password = admin
;board_build.f_cpu = 240000000L
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
	${env.build_flags}
	-I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
board_build.arduino.memory_type = qio_opi ; Only if you have an 8MB "OPI" PSRAM model

[env:ESP32-wemos]
extends = env:esp32-base
board = wemos_d1_mini32

[env:esp32dev]
extends = env:esp32-base
board = pico32
extra_scripts = upload.py
upload_protocol = custom
custom_upload_url = http://magiclamp.local
custom_username = admin
custom_password = admin
board_build.f_cpu = 240000000L
